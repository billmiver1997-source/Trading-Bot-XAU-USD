name: Deploy EA to MT5

on:
  push:
    branches: [main]
    paths:
      - '**.mq5'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload .mq5 files to server staging
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "*.mq5"
          target: "/tmp/mt5deploy"

      - name: Copy from staging to all MT5 Experts folders
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            for dir in \
              "/root/.wine/drive_c/Program Files/Equiti Brokerage (Seychelles) MT5 Terminal/MQL5/Experts" \
              "/root/.wine/drive_c/Program Files/MetaTrader 5/MQL5/Experts" \
              "/root/.wine_puprime/drive_c/Program Files/MetaTrader 5/MQL5/Experts" \
              "/root/.wine_tmgm/drive_c/Program Files/MetaTrader 5/MQL5/Experts"
            do
              if [ -d "$dir" ]; then
                cp /tmp/mt5deploy/*.mq5 "$dir/" && echo "OK  → $dir"
              else
                echo "SKIP→ $dir (not found)"
              fi
            done
            rm -rf /tmp/mt5deploy
            echo "Deploy complete: $(date)"
